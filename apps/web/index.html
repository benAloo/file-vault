<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>File Vault – Secure, Optimized Cloud Storage</title>
    <meta name="description" content="Secure, fast, and deduplicated cloud storage for all your critical files. Upload, organize, and share documents with zero-trust security and granular access controls." />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical URL to prevent duplicate content indexing issues -->
    <!-- Replace "https://filevault.example.com" with your production domain later -->
    <link rel="canonical" href="https://filevault.example.com" />

    <!-- Open Graph / Facebook (Used for rich previews on platforms like Slack, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://filevault.example.com" />
    <meta property="og:title" content="File Vault – Secure, Optimized Cloud Storage" />
    <meta property="og:description" content="Secure, fast, and deduplicated cloud storage for all your critical files. Upload, organize, and share documents with zero-trust security." />
    <meta property="og:image" content="https://filevault.example.com/og-preview.png" />
    <meta property="og:site_name" content="File Vault" />

    <!-- Twitter Card metadata -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://filevault.example.com" />
    <meta name="twitter:title" content="File Vault – Secure, Optimized Cloud Storage" />
    <meta name="twitter:description" content="Secure, fast, and deduplicated cloud storage for all your critical files. Upload, organize, and share documents with zero-trust security." />
    <meta name="twitter:image" content="https://filevault.example.com/og-preview.png" />

    <!-- Icons & PWA-ready capabilities -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Uncomment if you decide to introduce a web app manifest later -->
    <!-- <link rel="manifest" href="/site.webmanifest" /> -->
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-50">
    <!-- Noscript fallback allows basic crawler parsing if JS execution times out or fails -->
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: sans-serif;">
        <h1>File Vault</h1>
        <p>This secure file storage application requires JavaScript to function. Please enable JavaScript in your browser settings to access your account.</p>
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
